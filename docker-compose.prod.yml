services:
  gateway:
    image: ${REGISTRY_ORG}/${APP_NAME}:latest
    build:
      context: .
      dockerfile: docker/prod.Dockerfile
    ports:
      - '${APP_PORT}:3000'
    depends_on:
      - db
    environment:
      DB_URI: ${DB_URI}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      BASE_URL: ${BASE_URL}
    volumes:
      - .:/usr/src/app:delegated
      - /usr/src/app/node_modules
    networks:
      - local-network

  db:
    image: mongo
    restart: always
    ports:
      - '${DB_PORT}:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - local-network

volumes:
  mongo-data:
    driver: local

networks:
  local-network:
    driver: bridge
